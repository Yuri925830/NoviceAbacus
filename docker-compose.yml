services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: xiaobai
      POSTGRES_USER: xiaobai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xiaobai-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xiaobai"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  api:
    build: ./apps/api
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql+psycopg://xiaobai:${POSTGRES_PASSWORD:-xiaobai-local-only}@postgres:5432/xiaobai
    ports: ["127.0.0.1:8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_data:/app/data

  openai-gateway:
    build: ./apps/openai-gateway
    env_file: .env.local
    ports: ["127.0.0.1:8100:8100"]

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  postgres_data:
  redis_data:
  app_data:

